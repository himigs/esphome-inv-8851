substitutions:
  name: inverter
  friendly_name: "Inverter"
  uart_tx_pin: GPIO21
  uart_rx_pin: GPIO20
  version: "2"
  inverter_maximum_power: "4000"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

wifi:
  networks:
    - ssid: "WIFI_SSID"
      password: "WIFI_PASSWORD"
  power_save_mode: none
  fast_connect: true
  output_power: 8.5
  reboot_timeout: 15min
  ap:
    ssid: "AP_SSID"
    password: "AP_PASSWORD"

api:

ota:
  platform: esphome

packages:
  inv_8851:
    url: https://github.com/himigs/esphome-inv-8851
    ref: main
    files:
      - packages/core.yaml
      - packages/inverter.yaml
      - packages/grid.yaml
      - packages/temperature.yaml
      - packages/battery.yaml
      - packages/battery-24v.yaml
      - packages/bms-24v.yaml
      - packages/pv.yaml
    refresh: 0s