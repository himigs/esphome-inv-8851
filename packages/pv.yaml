binary_sensor:
  - platform: inv_8851
    pv_excess:
      name: "PV excess"
    pv_input:
      name: "PV input"
    pv_topology_initialization:
      name: "PV topology initialization"

text_sensor:
  - platform: inv_8851
    pv_topology:
      name: "PV topology"

sensor:
  - platform: inv_8851
    pv_current:
      name: "PV current"
    pv_power:
      name: "PV power"
      id: pv_power
    pv_voltage:
      name: "PV voltage"

  - platform: integration
    name: "PV Energy Total"
    sensor: pv_power
    time_unit: h
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 2
    integration_method: left
    filters:
      - multiply: 0.001
    unit_of_measurement: "kWh"
